<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прокачка Країни</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial;
}

body{
    margin:0;
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
    border-bottom:3px solid #374151;
}

#date{
    color:#facc15;
    font-size:20px;
    margin-top:5px;
}

.screen{
    padding:20px;
}

.country-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.country-card{
    background:#1e293b;
    border:2px solid #334155;
    border-radius:15px;
    padding:15px;
    cursor:pointer;
    transition:.2s;
}

.country-card:hover{
    transform:scale(1.03);
    background:#334155;
}

.hidden{
    display:none;
}

.layout{
    display:grid;
    grid-template-columns:1.4fr .8fr;
    gap:20px;
}

@media(max-width:900px){
    .layout{
        grid-template-columns:1fr;
    }
}

.panel{
    background:#1e293b;
    border-radius:15px;
    padding:15px;
}

.map{
    position:relative;
    width:100%;
    height:600px;
    background:#ececec;
    border-radius:20px;
    overflow:hidden;
    border:5px solid black;
}

.region{
    position:absolute;
    border:4px solid black;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:bold;
    color:black;
    padding:5px;
    transition:.2s;
}

.region:hover{
    transform:scale(1.02);
}

.owned{
    outline:6px solid yellow;
}

.babusia{
    left:42%;
    top:3%;
    width:25%;
    height:17%;
    background:#ffd180;
    clip-path:polygon(5% 40%,15% 10%,45% 2%,70% 8%,95% 30%,82% 50%,92% 78%,58% 92%,35% 74%,12% 80%,0 60%);
}

.lalukia{
    left:22%;
    top:15%;
    width:47%;
    height:39%;
    background:#cfd8dc;
    clip-path:polygon(3% 38%,12% 18%,24% 25%,34% 10%,53% 5%,67% 0,79% 10%,96% 8%,91% 32%,98% 50%,86% 70%,72% 68%,61% 96%,48% 84%,35% 96%,25% 78%,9% 72%,0 56%);
}

.tato{
    left:66%;
    top:9%;
    width:28%;
    height:40%;
    background:#d7ccc8;
    clip-path:polygon(3% 18%,30% 5%,54% 8%,78% 15%,82% 28%,96% 36%,100% 62%,85% 92%,64% 86%,50% 60%,28% 66%,15% 48%,0 42%);
}

.mama{
    left:68%;
    top:41%;
    width:20%;
    height:24%;
    background:#f8bbd0;
    clip-path:polygon(10% 8%,55% 0,90% 24%,98% 58%,70% 90%,32% 100%,5% 76%,0 35%);
}

.maks{
    left:59%;
    top:58%;
    width:22%;
    height:36%;
    background:#bbdefb;
    clip-path:polygon(12% 0,74% 8%,92% 35%,78% 70%,85% 100%,48% 94%,20% 72%,0 45%);
}

.vitska{
    left:25%;
    top:55%;
    width:36%;
    height:28%;
    background:#eeeeee;
    clip-path:polygon(4% 14%,36% 0,72% 8%,96% 28%,100% 84%,70% 90%,42% 84%,12% 100%,0 68%);
}

.nuclear{
    left:7%;
    top:40%;
    width:26%;
    height:39%;
    background:#c5e1a5;
    clip-path:polygon(25% 0,100% 4%,82% 38%,60% 84%,25% 76%,5% 96%,0 50%);
}

.spvd{
    left:8%;
    top:80%;
    width:28%;
    height:18%;
    background:#b0bec5;
    clip-path:polygon(10% 24%,42% 0,100% 12%,84% 88%,45% 92%,8% 100%,0 55%);
}

.stat{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    border-bottom:1px solid #334155;
    padding-bottom:5px;
}

.plus{
    color:#86efac;
}

.minus{
    color:#fca5a5;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
    background:#facc15;
}

button:hover{
    background:#fde047;
}

.log{
    background:#111827;
    border-radius:10px;
    height:170px;
    overflow:auto;
    padding:10px;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<header>
<h1>🌍 Прокачка Країни</h1>
<div id="date">8 березня 2023 року</div>
</header>

<div class="screen" id="chooseScreen">
<h2>Вибери країну</h2>

<div class="country-grid" id="countryGrid"></div>
</div>

<div class="screen hidden" id="gameScreen">

<div class="layout">

<div class="panel">

<h2>Карта</h2>

<div class="map">

<div class="region babusia">Бабуся</div>
<div class="region lalukia">Лалук'я</div>
<div class="region tato">Тато</div>
<div class="region mama">Мама</div>
<div class="region maks">Макс</div>
<div class="region vitska">Вітська<br>Республіка</div>
<div class="region nuclear">Ядерна<br>Країна</div>
<div class="region spvd">СПВД</div>

</div>
</div>

<div class="panel">

<h2 id="countryName"></h2>

<div class="stat">
<span>👥 Населення</span>
<span>
<span id="population"></span>
<span id="popDelta"></span>
</span>
</div>

<div class="stat">
<span>💰 Гроші</span>
<span>
<span id="money"></span>
<span id="moneyDelta"></span>
</span>
</div>

<div class="stat">
<span>🌾 Їжа</span>
<span>
<span id="food"></span>
<span id="foodDelta"></span>
</span>
</div>

<div class="stat">
<span>🛡️ Армія</span>
<span id="army"></span>
</div>

<div class="stat">
<span>📏 Площа</span>
<span id="area"></span>
</div>

<div class="stat">
<span>😊 Стабільність</span>
<span id="stability"></span>
</div>

<button onclick="upgradeEconomy()">
Прокачати економіку
</button>

<button onclick="upgradeArmy()">
Прокачати армію
</button>

<button onclick="upgradeFood()">
Покращити їжу
</button>

<div class="log" id="log"></div>

</div>

</div>

</div>

<script>

const countries = [

{
name:"Вітська Республіка",
population:320000000,
army:40000,
area:500000,
stability:90,
money:1500,
food:1200,
economy:5
},

{
name:"Лалук'я",
population:180000000,
army:15000,
area:1150000,
stability:60,
money:1200,
food:1000,
economy:4
},

{
name:"Тато",
population:150000000,
army:10000,
area:600000,
stability:80,
money:1100,
food:1000,
economy:4
},

{
name:"Макс",
population:130000000,
army:30000,
area:300000,
stability:80,
money:1200,
food:950,
economy:4
},

{
name:"Мама",
population:150000000,
army:5000,
area:400000,
stability:70,
money:1000,
food:1200,
economy:3
},

{
name:"Бабуся",
population:50000000,
army:100,
area:100000,
stability:90,
money:900,
food:1400,
economy:3
},

{
name:"СПВД",
population:175000000,
army:45000,
area:250000,
stability:70,
money:1300,
food:900,
economy:4
},

{
name:"Ядерна Країна",
population:90000000,
army:35000,
area:350000,
stability:60,
money:1400,
food:700,
economy:5
}

];

let player;
let currentDate=new Date(2023,2,8);

let popChange=0;
let moneyChange=0;
let foodChange=0;

const grid=document.getElementById("countryGrid");

countries.forEach(c=>{

const card=document.createElement("div");

card.className="country-card";

card.innerHTML=`
<h2>${c.name}</h2>
<p>👥 ${format(c.population)}</p>
<p>🛡️ ${format(c.army)}</p>
`;

card.onclick=()=>chooseCountry(c);

grid.appendChild(card);

});

function chooseCountry(country){

player=JSON.parse(JSON.stringify(country));

document.getElementById("chooseScreen").classList.add("hidden");

document.getElementById("gameScreen").classList.remove("hidden");

document.getElementById("countryName").innerText=player.name;

updateUI();

setInterval(nextDay,3000);

log("🌍 Почалась гра за країну "+player.name);

}

function nextDay(){

currentDate.setDate(currentDate.getDate()+1);

let density=player.population/player.area;

popChange=Math.floor(player.population*0.0005);

moneyChange=Math.floor(player.economy*50);

foodChange=Math.floor(player.economy*20);

if(player.stability<50){
popChange-=50000;
}

if(player.food<500){
popChange-=70000;
}

if(density>1000){
popChange-=120000;
}

player.population+=popChange;
player.money+=moneyChange;
player.food+=foodChange;

if(Math.random()<0.05){

let lost=Math.floor(player.army*0.05);

player.army-=lost;

log("⚔️ На тебе напала інша країна! Втрати армії: "+format(lost));

}

updateUI();

}

function updateUI(){

document.getElementById("date").innerText=formatDate(currentDate);

document.getElementById("population").innerText=format(player.population);

document.getElementById("money").innerText=format(player.money);

document.getElementById("food").innerText=format(player.food);

document.getElementById("army").innerText=format(player.army);

document.getElementById("area").innerText=format(player.area)+" км²";

document.getElementById("stability").innerText=player.stability+"%";

document.getElementById("popDelta").innerHTML=
(popChange>=0?
`<span class='plus'>+${format(popChange)}</span>`:
`<span class='minus'>${format(popChange)}</span>`);

document.getElementById("moneyDelta").innerHTML=
`<span class='plus'>+${format(moneyChange)}</span>`;

document.getElementById("foodDelta").innerHTML=
(foodChange>=0?
`<span class='plus'>+${format(foodChange)}</span>`:
`<span class='minus'>${format(foodChange)}</span>`);

}

function upgradeEconomy(){

if(player.money<500)return;

player.money-=500;

player.economy++;

log("🏭 Економіка покращена");

}

function upgradeArmy(){

if(player.money<600)return;

player.money-=600;

player.army+=5000;

log("🛡️ Армія збільшилась");

}

function upgradeFood(){

if(player.money<400)return;

player.money-=400;

player.food+=300;

player.stability+=2;

log("🌾 Покращено їжу");

}

function log(text){

const div=document.getElementById("log");

const el=document.createElement("div");

el.innerText=formatDate(currentDate)+" — "+text;

div.prepend(el);

}

function format(num){

return Math.floor(num).toLocaleString("uk-UA");

}

function formatDate(date){

const months=[
"січня",
"лютого",
"березня",
"квітня",
"травня",
"червня",
"липня",
"серпня",
"вересня",
"жовтня",
"листопада",
"грудня"
];

return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()} року`;

}

</script>

</body>
</html>
