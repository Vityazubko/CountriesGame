<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Імперії Карти — Області та Столиці</title>
<style>
:root{--bg:#081326;--panel:#12223f;--line:#35517e;--txt:#eef4ff;--muted:#acc0e8;--ok:#5de08d;--bad:#ff8686;--map:#eef2f7}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#102548,#081326 65%);color:var(--txt);font-family:Segoe UI,Arial}
header{position:sticky;top:0;z-index:5;display:flex;gap:8px;align-items:center;justify-content:space-between;padding:10px 14px;background:#08162fdb;border-bottom:1px solid var(--line);backdrop-filter:blur(4px)}
.wrap{max-width:1550px;margin:0 auto;padding:12px}.hidden{display:none}.layout{display:grid;grid-template-columns:1.25fr .75fr;gap:12px}@media(max-width:1120px){.layout{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,#132646,#10203b);border:1px solid var(--line);border-radius:14px;padding:12px}
.choose{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.pick{cursor:pointer}.pick:hover{outline:2px solid #6e91d2}
.map{position:relative;height:750px;background:var(--map);border:4px solid #101318;border-radius:16px;overflow:hidden}
.region{position:absolute;border:4px solid #0a0a0a;border-radius:10px;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:800;color:#111;line-height:1.1;padding:4px;cursor:pointer;box-shadow:inset 0 0 0 1px #ffffff70}
.region .capital{position:absolute;width:14px;height:14px;border-radius:50%;background:#ffe44f;right:8px;bottom:8px;box-shadow:0 0 12px #ffd200}
.subRegion{position:absolute;border:3px solid #5a606d;border-radius:8px;background:#ffffff99;font-size:.75rem;font-weight:700;color:#111;display:flex;align-items:center;justify-content:center;text-align:center;padding:3px;cursor:pointer}
.player{outline:5px solid #ffe173}.ally{box-shadow:0 0 0 4px #35db8a inset}.war{box-shadow:0 0 0 4px #ff8b8b inset}
.vitska{left:27%;top:57%;width:34%;height:24%;background:#f8f8f8;clip-path:polygon(4% 14%,36% 0,72% 8%,96% 28%,100% 84%,70% 90%,42% 84%,12% 100%,0 68%)}
.lalukia{left:22%;top:16%;width:47%;height:36%;background:#dce2ea;clip-path:polygon(2% 39%,12% 16%,23% 24%,35% 11%,52% 5%,68% 1%,79% 10%,95% 8%,91% 32%,99% 51%,86% 70%,72% 67%,61% 96%,48% 84%,35% 96%,25% 79%,8% 72%,0 57%)}
.tato{left:68%;top:10%;width:28%;height:39%;background:#e4d5ca;clip-path:polygon(3% 18%,31% 5%,54% 8%,79% 16%,83% 29%,97% 37%,100% 61%,85% 91%,64% 86%,50% 60%,29% 66%,15% 49%,0 42%)}
.mama{left:69%;top:42%;width:19%;height:24%;background:#ffcddf;clip-path:polygon(10% 8%,55% 0,90% 24%,98% 58%,71% 90%,31% 100%,5% 76%,0 35%)}
.maks{left:60%;top:58%;width:21%;height:35%;background:#cce5ff;clip-path:polygon(11% 0,74% 8%,92% 35%,78% 70%,85% 100%,48% 94%,20% 72%,0 45%)}
.nuclear{left:10%;top:40%;width:23%;height:35%;background:#d8eeb6;clip-path:polygon(25% 0,100% 4%,82% 38%,60% 84%,25% 76%,5% 96%,0 50%)}
.spvd{left:18%;top:82%;width:31%;height:15%;background:#c2ccda;clip-path:polygon(8% 26%,40% 0,100% 14%,86% 90%,44% 94%,8% 100%,0 55%)}
.arubia{left:2%;top:63%;width:18%;height:17%;background:#f6e4b8;clip-path:polygon(7% 20%,38% 5%,95% 12%,97% 60%,65% 92%,10% 88%,0 50%)}
.sylva{left:1%;top:80%;width:17%;height:16%;background:#d6f2d5;clip-path:polygon(12% 6%,58% 0,96% 20%,90% 84%,42% 100%,4% 88%,0 45%)}
.babusia{left:46%;top:4%;width:20%;height:14%;background:#ffd48d;clip-path:polygon(8% 40%,18% 8%,46% 2%,70% 8%,92% 28%,84% 53%,94% 79%,56% 95%,33% 74%,13% 80%,0 61%)}
.vaydashka{left:32%;top:1%;width:12%;height:8%;background:#f8e6ff;clip-path:polygon(8% 24%,35% 5%,92% 15%,96% 68%,61% 92%,14% 86%,0 48%)}
.murchyk{left:72%;top:0.5%;width:24%;height:11%;background:#f5f0d0;clip-path:polygon(3% 28%,22% 8%,60% 5%,93% 20%,100% 45%,84% 84%,45% 92%,14% 81%,0 56%)}
.row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 0}.plus{color:var(--ok)}.minus{color:var(--bad)}
button,input{width:100%;padding:9px;border:none;border-radius:9px;margin-top:7px}button{background:linear-gradient(180deg,#ffe179,#ffc940);font-weight:700;cursor:pointer}
.tbl,.log{max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#0b152c;padding:8px}.mini{font-size:.86rem;color:var(--muted)}
#countryModal{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;padding:12px}#countryModal.show{display:flex}.modal{width:min(640px,96vw);background:#12203d;border:1px solid var(--line);border-radius:12px;padding:12px}
</style>
</head>
<body>
<header><div><h2 style="margin:0">🗺️ Імперії Карти</h2><div id="date"></div></div><div style="display:flex;gap:8px"><button id="mapModeBtn" onclick="toggleMapMode()">Карта: Країни</button><button id="speedBtn" onclick="toggleSpeed()">Швидкість: x1</button></div></header>
<div class="wrap" id="chooseScreen"><h3>Обери країну</h3><div class="choose" id="countryGrid"></div></div>
<div class="wrap hidden" id="gameScreen"><div class="layout"><section class="card"><h3>Карта (клікни країну / область)</h3><div class="map" id="map"></div></section>
<section class="card"><h3 id="countryName"></h3><div class="row"><span>👥 Населення</span><span><b id="population"></b> <span id="popDelta"></span></span></div><div class="row"><span>💰 Гроші</span><span><b id="money"></b> <span id="moneyDelta"></span></span></div><div class="row"><span>🌾 Їжа</span><span><b id="food"></b> <span id="foodDelta"></span></span></div><div class="row"><span>🛡️ Армія</span><b id="army"></b></div><div class="row"><span>📐 Площа</span><b id="area"></b></div><div class="row"><span>😊 Стабільність</span><b id="stability"></b></div><div class="row"><span>🏭 Економіка</span><b id="economy"></b></div><div class="mini" id="prices"></div>
<button id="btnEco" onclick="upgrade('economy')"></button><button id="btnArmy" onclick="upgrade('army')"></button><button id="btnFood" onclick="upgrade('foodProd')"></button><button id="btnStab" onclick="upgrade('stability')"></button><div class="tbl" id="relations"></div><h4>Події</h4><div class="log" id="log"></div></section></div></div>
<div id="countryModal"><div class="modal"><h3 id="mName"></h3><div id="mInfo" class="mini"></div><div id="oblastTargetWrap" class="mini" style="margin-top:8px"></div><input id="aidInput" type="number" min="0" step="100" value="1000"/><button onclick="sendAid()">Надіслати гроші</button><button id="warPeaceBtn" onclick="modalWarPeace()"></button><button id="allyBtn" onclick="modalAllianceToggle()"></button><button onclick="closeModal()" style="background:#93a7d6">Закрити</button></div></div>
<script>
const DAY_MS=3000, START=new Date(2023,2,8);
const regions=[
{name:"Вітська Республіка",shape:"vitska",capital:"Сіверянськ",population:320000000,army:40000,area:500000,stability:90,money:2600,food:1900,economy:6,oblasts:["Вітська область","Сіверянська область","Парківська область","Річка область"]},
{name:"Лалук'я",shape:"lalukia",capital:"Котобаївка",population:180000000,army:15000,area:1150000,stability:60,money:1700,food:1300,economy:4,oblasts:["Мухська область","Лук'янська область","Котобаївська область","Область Лус"]},
{name:"Макс",shape:"maks",capital:"Брак",population:130000000,army:30000,area:300000,stability:80,money:1800,food:1100,economy:5},
{name:"СПВД",shape:"spvd",capital:"Місто СПВД",population:175000000,army:45000,area:250000,stability:70,money:2200,food:950,economy:5},
{name:"Ядерна Країна",shape:"nuclear",capital:"Ядерія",population:90000000,army:35000,area:350000,stability:60,money:2100,food:900,economy:5},
{name:"Тато",shape:"tato",capital:"Татія",population:150000000,army:10000,area:600000,stability:80,money:1600,food:1200,economy:4},
{name:"Мама",shape:"mama",capital:"Мамія",population:150000000,army:5000,area:400000,stability:70,money:1500,food:1300,economy:4},
{name:"Бабуся",shape:"babusia",capital:"Бабусія",population:50000000,army:100,area:100000,stability:90,money:1300,food:1400,economy:3},
{name:"Арубія",shape:"arubia",capital:"Арубнія",population:80000000,army:25000,area:150000,stability:60,money:1500,food:950,economy:4},
{name:"Сильва",shape:"sylva",capital:"Сильвестрія",population:80000000,army:15000,area:150000,stability:80,money:1400,food:1100,economy:4},
{name:"Вайдашка",shape:"vaydashka",capital:"Вайдашк",population:1000000,army:5000,area:50000,stability:40,money:400,food:350,economy:2},
{name:"Мурчик",shape:"murchyk",capital:"Мурлендія",population:2000000,army:10000,area:200000,stability:70,money:700,food:800,economy:3}
];
const oblastBox={"Вітська Республіка":[{n:"Вітська область",x:31,y:62,w:12,h:10},{n:"Сіверянська область",x:43,y:61,w:15,h:12},{n:"Парківська область",x:56,y:58,w:9,h:10},{n:"Річка область",x:26,y:68,w:10,h:9}],"Лалук'я":[{n:"Мухська область",x:23,y:26,w:15,h:12},{n:"Лук'янська область",x:37,y:26,w:19,h:14},{n:"Котобаївська область",x:54,y:22,w:12,h:10},{n:"Область Лус",x:39,y:39,w:14,h:11}]};
const S={date:new Date(START),player:null,countries:[],modalTarget:null,mapMode:"countries",speed:1,timer:null,price:{economy:600,army:700,foodProd:500,stability:450},selectedTargetOblast:null};
function init(){S.countries=regions.map(c=>({...c,alive:true,relations:{},war:null,warDays:0,nextWar:r(90,150),nextEvent:r(7,21),delta:{p:0,m:0,f:0},foodProd:1.35,oblastState:(c.oblasts||[]).map(n=>({name:n,owner:c.name,pop:Math.floor(c.population/(c.oblasts?.length||1)),army:Math.max(2000,Math.floor(c.army/(c.oblasts?.length||1))),stability:c.stability}) ) }));
S.countries.forEach(a=>S.countries.forEach(b=>{if(a.name!==b.name)a.relations[b.name]=0;}));drawPick();drawMap();uDate();}
function drawPick(){el('countryGrid').innerHTML=S.countries.map(c=>`<div class='card pick' onclick="choose('${c.name}')"><h4>${c.name}</h4><div>🏛️ ${c.capital}</div><div>👥 ${f(c.population)}</div></div>`).join('');}
function drawMap(){const m=el('map');m.innerHTML='';S.countries.forEach(c=>{const d=document.createElement('div');d.className='region '+c.shape;d.id='r'+id(c.name);d.innerHTML=`${c.name}<div class='capital' title='Столиця: ${c.capital}'></div>`;d.onclick=()=>openCountryMenu(c.name);m.appendChild(d);});renderOblastOverlay();}
function renderOblastOverlay(){document.querySelectorAll('.subRegion').forEach(x=>x.remove());if(S.mapMode!=='oblasts')return;const m=el('map');for(const name of ["Вітська Республіка","Лалук'я"]){const c=get(name);if(!c)continue;const list=oblastBox[name]||[];list.forEach((b,i)=>{const st=c.oblastState[i];const d=document.createElement('div');d.className='subRegion';d.style.left=b.x+'%';d.style.top=b.y+'%';d.style.width=b.w+'%';d.style.height=b.h+'%';d.textContent=st.name;d.title=`${st.name}
Власник: ${st.owner}
Населення: ${f(st.pop)}
Армія: ${f(st.army)}
Стабільність: ${st.stability.toFixed(1)}%`;d.onclick=(e)=>{e.stopPropagation();showOblastInfo(c,st)};m.appendChild(d);});}}
function showOblastInfo(country,ob){log(`🧭 ${country.name} — ${ob.name}: населення ${f(ob.pop)}, армія ${f(ob.army)}, стабільність ${ob.stability.toFixed(1)}%`);}
function choose(n){S.player=n;el('chooseScreen').classList.add('hidden');el('gameScreen').classList.remove('hidden');log('🌍 Старт за '+n);upd();resetTimer();}
function resetTimer(){if(S.timer)clearInterval(S.timer);S.timer=setInterval(()=>nextDay(S.speed),DAY_MS);}function toggleSpeed(){S.speed=S.speed===1?2:1;el('speedBtn').textContent='Швидкість: x'+S.speed;}
function toggleMapMode(){S.mapMode=S.mapMode==='countries'?'oblasts':'countries';el('mapModeBtn').textContent='Карта: '+(S.mapMode==='countries'?'Країни':'Області');renderOblastOverlay();}
function nextDay(days=1){for(let i=0;i<days;i++){S.date.setDate(S.date.getDate()+1);alive().forEach(sim);wars();}upd();}
function sim(c){let dP=Math.floor(c.population*(0.00004+c.economy*0.000004)),dM=Math.floor(c.economy*21+c.population/2200000),dF=Math.floor(c.economy*15*c.foodProd-c.population/1400000);
if(c.food<=0){dP-=Math.floor(c.population*0.0012);c.stability=Math.max(0,c.stability-0.25);} if(c.stability<45){dP-=25000;c.population=Math.max(0,c.population-Math.floor(c.population*0.0002));}
if(c.war){dP=Math.floor(dP*0.45);dM=Math.floor(dM*0.7);dF=Math.floor(dF*0.75);c.army=Math.max(0,c.army-Math.max(20,Math.floor(c.army*0.002)));c.relations[c.war]=-100;}
c.population=Math.max(0,c.population+dP);c.money=Math.max(0,c.money+dM);c.food=Math.max(0,c.food+dF);c.delta={p:dP,m:dM,f:dF};if(c.name!==S.player)ai(c);if(--c.nextWar<=0){aiWar(c);c.nextWar=r(90,150);} }
function ai(c){if(Math.random()<.12&&c.money>500){c.money-=500;c.economy++;}if(Math.random()<.1&&c.money>650){c.money-=650;c.army+=2000;}if(Math.random()<.14&&c.money>450){c.money-=450;c.foodProd+=0.08;}if(Math.random()<.12&&c.money>450&&c.stability<95){c.money-=450;c.stability=Math.min(100,c.stability+2.2);} }
function aiWar(a){if(a.war||!a.alive)return;const t=alive().filter(b=>b.name!==a.name&&!allied(a,b)&&a.relations[b.name]<-10);if(!t.length)return;startWar(a,pick(t),'Планова атака');}
function startWar(a,b,why){if(a.war||b.war)return;a.war=b.name;b.war=a.name;a.warDays=b.warDays=r(5,30);a.relations[b.name]=-100;b.relations[a.name]=-100;log(`⚔️ ${a.name} ↔ ${b.name} (${why}, ${a.warDays} дн.)`);}
function wars(){alive().forEach(c=>{if(!c.war)return;c.warDays--;if(c.warDays<=0){const e=get(c.war);if(e&&e.war===c.name)resolve(c,e);}});} 
function resolve(a,b){if(hasOblasts(a)||hasOblasts(b)){const attacker=a;const defender=b;captureOblast(attacker,defender);} else annex(pow(a)>=pow(b)?a:b,pow(a)>=pow(b)?b:a);a.war=null;b.war=null;}
function captureOblast(att,def){const free=def.oblastState.filter(o=>o.owner===def.name);if(!free.length){annex(att,def);return;}const target=S.selectedTargetOblast&&free.find(o=>o.name===S.selectedTargetOblast)?free.find(o=>o.name===S.selectedTargetOblast):pick(free);target.owner=att.name;att.population+=Math.floor(target.pop*0.35);att.area+=Math.floor(def.area/(def.oblastState.length||1));log(`🏴 ${att.name} захопила область ${target.name} у ${def.name}`);if(def.oblastState.every(o=>o.owner!==def.name)){annex(att,def);}renderOblastOverlay();S.selectedTargetOblast=null;}
function annex(w,l){w.population+=Math.floor(l.population*.65);w.food+=Math.floor(l.food*.6);w.money+=Math.floor(l.money*.5);w.army+=Math.floor(l.army*.25);l.alive=false;const e=el('r'+id(l.name));if(e)e.style.opacity='.4';log(`🏴 ${w.name} перемогла ${l.name}`);} 
function upgrade(t){const p=pl(),price=S.price[t];if(p.money<price)return log('❌ Мало грошей');p.money-=price;if(t==='economy')p.economy++;if(t==='army')p.army+=3500;if(t==='foodProd')p.foodProd+=0.18;if(t==='stability')p.stability=Math.min(100,p.stability+3);S.price[t]=Math.floor(S.price[t]*1.1);upd();}
function openCountryMenu(name){if(!S.player||name===S.player)return;const t=get(name),p=pl();if(!t)return;S.modalTarget=name;el('mName').textContent=t.name;el('mInfo').innerHTML=`Столиця: <b>${t.capital}</b><br>Населення: ${f(t.population)} | Армія: ${f(t.army)} | Стабільність: ${t.stability.toFixed(1)}%<br>Гроші: ${f(t.money)} | Їжа: ${f(t.food)}<br>Відносини: ${p.relations[t.name].toFixed(0)}`;
if(hasOblasts(t)&&p.war!==t.name){el('oblastTargetWrap').innerHTML='Ціль атаки: <select id="oblastTarget">'+t.oblastState.filter(o=>o.owner===t.name).map(o=>`<option>${o.name}</option>`).join('')+'</select>';}
else el('oblastTargetWrap').innerHTML='';
el('warPeaceBtn').textContent=p.war===t.name?'Мирний Договір':'Оголосити Війну';el('allyBtn').textContent=allied(p,t)?'Вийти з Союзу':'Зробити Союз';el('countryModal').classList.add('show');}
function closeModal(){el('countryModal').classList.remove('show');}
function modalWarPeace(){const p=pl(),t=get(S.modalTarget);if(!t)return;if(p.war===t.name){const c=peaceCost(p,t);if(p.money<c)return log(`❌ Для миру потрібно ${f(c)}`);p.money-=c;p.war=null;t.war=null;p.relations[t.name]=-60;t.relations[p.name]=-60;log(`🕊️ Мир з ${t.name} за ${f(c)}`);}else{const s=el('oblastTarget');if(s)S.selectedTargetOblast=s.value;startWar(p,t,'Ти оголосив війну');}closeModal();upd();}
function modalAllianceToggle(){const p=pl(),t=get(S.modalTarget);if(!t)return;if(allied(p,t)){p.relations[t.name]=70;t.relations[p.name]=70;}else{const cost=1200+Math.floor((100-p.relations[t.name])*10);if(p.money<cost)return log('❌ Мало грошей на союз');p.money-=cost;p.relations[t.name]=95;t.relations[p.name]=95;}upd();openCountryMenu(t.name);} 
function sendAid(){const p=pl(),t=get(S.modalTarget),sum=Math.max(0,Number(el('aidInput').value||0));if(!t||sum<=0)return;const need=Math.max(10,Math.floor(peaceCost(p,t)/1000));if(sum<need)return log(`❌ Мінімум ${need} для покращення відносин`);if(p.money<sum)return log('❌ Немає стільки грошей');p.money-=sum;t.money+=sum;const gain=Math.max(1,Math.floor(sum/need/2));p.relations[t.name]=Math.min(100,p.relations[t.name]+gain);t.relations[p.name]=Math.min(100,t.relations[p.name]+Math.floor(gain*0.8));upd();openCountryMenu(t.name);} 
function upd(){const p=pl();if(!p)return;uDate();set('countryName',p.name+' — столиця '+p.capital);set('population',f(p.population));set('money',f(p.money));set('food',f(p.food));set('army',f(p.army));set('area',f(p.area)+' км²');set('stability',p.stability.toFixed(1)+'%');set('economy',p.economy);delta('popDelta',p.delta.p);delta('moneyDelta',p.delta.m);delta('foodDelta',p.delta.f);
set('prices',`Ціни: Економіка ${f(S.price.economy)} | Армія ${f(S.price.army)} | Пекарня ${f(S.price.foodProd)} | Стабільність ${f(S.price.stability)}`);set('btnEco','Прокачати економіку ('+f(S.price.economy)+')');set('btnArmy','Прокачати армію ('+f(S.price.army)+')');set('btnFood','Побудувати Пекарню ('+f(S.price.foodProd)+')');set('btnStab','Підняти стабільність ('+f(S.price.stability)+')');
alive().forEach(c=>{const e=el('r'+id(c.name));if(!e)return;e.classList.toggle('player',c.name===p.name);e.classList.toggle('ally',allied(c,p));e.classList.toggle('war',p.war===c.name||c.war===p.name);});
el('relations').innerHTML=alive().filter(c=>c.name!==p.name).map(c=>`<div class='row'><span>${c.name} (${c.capital})</span><b>${p.relations[c.name].toFixed(0)}</b></div>`).join('');}
function peaceCost(a,b){return Math.floor(8000+b.army*0.08+Math.max(0,-a.relations[b.name])*80)}
function hasOblasts(c){return (c.oblastState||[]).length>0}
function pow(c){return c.army*(.7+c.stability/100)+c.economy*420+c.population/90000}
function alive(){return S.countries.filter(c=>c.alive)} function pl(){return get(S.player)} function get(n){return S.countries.find(c=>c.name===n)}
function allied(a,b){return a.relations[b.name]>=90&&b.relations[a.name]>=90} function pick(a){return a[Math.floor(Math.random()*a.length)]} function r(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function delta(i,v){el(i).innerHTML=`<span class='${v>=0?'plus':'minus'}'>${v>=0?'+':''}${f(v)}</span>`} function set(i,v){el(i).textContent=v} function el(i){return document.getElementById(i)}
