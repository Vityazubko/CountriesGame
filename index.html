<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Імперії Карти — Deluxe+</title>
<style>
:root{--bg:#07101f;--panel:#12203d;--line:#31486f;--txt:#eef4ff;--muted:#9cb2de;--ok:#52d879;--bad:#ff7f7f}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#0e1f3d,#07101f 65%);color:var(--txt);font-family:Segoe UI,Arial}
header{position:sticky;top:0;background:#08152bcc;border-bottom:1px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.wrap{max-width:1500px;margin:0 auto;padding:14px}.hidden{display:none}.grid{display:grid;gap:12px}.choose{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}.layout{grid-template-columns:1.2fr .8fr}.side{display:grid;gap:12px;grid-template-columns:1fr 1fr}@media(max-width:1100px){.layout{grid-template-columns:1fr}.side{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,#12203d,#0f1a33);border:1px solid var(--line);border-radius:14px;padding:12px}.pick{cursor:pointer}.pick:hover{outline:2px solid #6686cc}
.map{position:relative;height:720px;background:#f2f5fb;border-radius:15px;border:4px solid #101010;overflow:hidden}
.region{position:absolute;border:4px solid #111;display:flex;justify-content:center;align-items:center;text-align:center;font-weight:800;color:#101010;line-height:1.1;padding:4px;cursor:pointer;position:absolute}.capital{position:absolute;width:14px;height:14px;border-radius:50%;background:#ffe44f;right:8px;bottom:8px;box-shadow:0 0 12px #ffd200}
.player{outline:5px solid #ffe173}.ally{box-shadow:0 0 0 4px #35db8a inset}.war{box-shadow:0 0 0 4px #ff8b8b inset}.annexed{opacity:.5}
.vaydashka{left:31%;top:1%;width:14%;height:9%;background:#f8e6ff;clip-path:polygon(8% 24%,35% 5%,92% 15%,96% 68%,61% 92%,14% 86%,0 48%)}
.murchyk{left:72%;top:1%;width:23%;height:11%;background:#f5f0d0;clip-path:polygon(3% 28%,22% 8%,60% 5%,93% 20%,100% 45%,84% 84%,45% 92%,14% 81%,0 56%)}
.babusia{left:43%;top:2%;width:22%;height:16%;background:#ffd48d;clip-path:polygon(8% 40%,18% 8%,46% 2%,70% 8%,92% 28%,84% 53%,94% 79%,56% 95%,33% 74%,13% 80%,0 61%)}
.lalukia{left:20%;top:13%;width:49%;height:39%;background:#dce2ea;clip-path:polygon(2% 39%,12% 16%,23% 24%,35% 11%,52% 5%,68% 1%,79% 10%,95% 8%,91% 32%,99% 51%,86% 70%,72% 67%,61% 96%,48% 84%,35% 96%,25% 79%,8% 72%,0 57%)}
.tato{left:65%;top:8%;width:30%;height:41%;background:#e4d5ca;clip-path:polygon(3% 18%,31% 5%,54% 8%,79% 16%,83% 29%,97% 37%,100% 61%,85% 91%,64% 86%,50% 60%,29% 66%,15% 49%,0 42%)}
.mama{left:68%;top:40%;width:20%;height:24%;background:#ffcddf;clip-path:polygon(10% 8%,55% 0,90% 24%,98% 58%,71% 90%,31% 100%,5% 76%,0 35%)}
.maks{left:59%;top:58%;width:22%;height:35%;background:#cce5ff;clip-path:polygon(11% 0,74% 8%,92% 35%,78% 70%,85% 100%,48% 94%,20% 72%,0 45%)}
.vitska{left:25%;top:54%;width:36%;height:27%;background:#f8f8f8;clip-path:polygon(4% 14%,36% 0,72% 8%,96% 28%,100% 84%,70% 90%,42% 84%,12% 100%,0 68%)}
.nuclear{left:9%;top:39%;width:24%;height:36%;background:#d8eeb6;clip-path:polygon(25% 0,100% 4%,82% 38%,60% 84%,25% 76%,5% 96%,0 50%)}
.spvd{left:17%;top:80%;width:32%;height:16%;background:#c2ccda;clip-path:polygon(8% 26%,40% 0,100% 14%,86% 90%,44% 94%,8% 100%,0 55%)}
.arubia{left:1%;top:62%;width:19%;height:18%;background:#f6e4b8;clip-path:polygon(7% 20%,38% 5%,95% 12%,97% 60%,65% 92%,10% 88%,0 50%)}
.sylva{left:0%;top:79%;width:18%;height:16%;background:#d6f2d5;clip-path:polygon(12% 6%,58% 0,96% 20%,90% 84%,42% 100%,4% 88%,0 45%)}
.row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 0}.plus{color:var(--ok)}.minus{color:var(--bad)}
button,input{width:100%;padding:9px;border:none;border-radius:9px;margin-top:7px}button{background:linear-gradient(180deg,#ffe179,#ffc940);font-weight:700;cursor:pointer}
.log,.tbl{max-height:170px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#0b152c;padding:8px}.mini{color:var(--muted);font-size:.86rem}
#countryModal{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;padding:12px}#countryModal.show{display:flex}.modalBox{width:min(550px,95vw);background:#12203d;border:1px solid var(--line);border-radius:12px;padding:12px}
</style>
</head><body>
<header><div><h2 style="margin:0">🗺️ Імперії Карти</h2><div id="date"></div></div><div style="display:flex;gap:8px"><button id="mapModeBtn" onclick="toggleMapMode()">Карта: Країни</button><button id="speedBtn" onclick="toggleSpeed()">Швидкість: x1</button></div></header>
<div class="wrap" id="chooseScreen"><h3>Обери країну</h3><div class="grid choose" id="countryGrid"></div></div>
<div class="wrap hidden" id="gameScreen"><div class="grid layout"><section class="card"><h3>Карта</h3><div class="map" id="map"></div></section>
<section class="card"><h3 id="countryName"></h3>
<div class="row"><span>👥 Населення</span><span><b id="population"></b> <span id="popDelta"></span></span></div><div class="row"><span>💰 Гроші</span><span><b id="money"></b> <span id="moneyDelta"></span></span></div><div class="row"><span>🌾 Їжа</span><span><b id="food"></b> <span id="foodDelta"></span></span></div>
<div class="row"><span>🛡️ Армія</span><b id="army"></b></div><div class="row"><span>📐 Площа</span><b id="area"></b></div><div class="row"><span>😊 Стабільність</span><b id="stability"></b></div><div class="row"><span>🏭 Економіка</span><b id="economy"></b></div>
<div class="mini" id="prices"></div>
<button id="btnEco" onclick="upgrade('economy')"></button><button id="btnArmy" onclick="upgrade('army')"></button><button id="btnFood" onclick="upgrade('foodProd')"></button><button id="btnHouses" onclick="upgrade('houses')"></button>
<div class="side"><div><h4>Відносини</h4><div class="tbl" id="relations"></div></div><div><h4>Топи</h4><div class="tbl" id="tops"></div></div></div>
<h4>Події</h4><div class="log" id="log"></div></section></div></div>
<div id="countryModal"><div class="modalBox"><h3 id="mName"></h3><div id="mInfo" class="mini"></div><label>💸 Сума допомоги:</label><input id="aidInput" type="number" min="0" step="100" value="1000"/>
<button onclick="sendAid()">Надіслати гроші</button><button id="warPeaceBtn" onclick="modalWarPeace()"></button><button id="allyBtn" onclick="modalAllianceToggle()"></button><button onclick="closeModal()" style="background:#93a7d6">Закрити</button></div></div>
<script>
const DAY_MS=3000, START=new Date(2023,2,8);
const regions=[
{name:"Вітська Республіка",shape:"vitska",capital:"Сіверянськ",population:320000000,army:40000,area:500000,stability:90,money:2600,food:1900,economy:6},
{name:"Лалук'я",shape:"lalukia",capital:"Котобаївка",population:180000000,army:15000,area:1150000,stability:60,money:1700,food:1300,economy:4},
{name:"Макс",shape:"maks",capital:"Брак",population:130000000,army:30000,area:300000,stability:80,money:1800,food:1100,economy:5},
{name:"СПВД",shape:"spvd",capital:"Місто СПВД",population:175000000,army:45000,area:250000,stability:70,money:2200,food:950,economy:5},
{name:"Ядерна Країна",shape:"nuclear",capital:"Ядерія",population:90000000,army:35000,area:350000,stability:60,money:2100,food:900,economy:5},
{name:"Тато",shape:"tato",capital:"Татія",population:150000000,army:10000,area:600000,stability:80,money:1600,food:1200,economy:4},
{name:"Мама",shape:"mama",capital:"Мамія",population:150000000,army:5000,area:400000,stability:70,money:1500,food:1300,economy:4},
{name:"Бабуся",shape:"babusia",capital:"Бабусія",population:50000000,army:100,area:100000,stability:90,money:1300,food:1400,economy:3},
{name:"Арубія",shape:"arubia",capital:"Арубнія",population:80000000,army:25000,area:150000,stability:60,money:1500,food:950,economy:4},
{name:"Сильва",shape:"sylva",capital:"Сильвестрія",population:80000000,army:15000,area:150000,stability:80,money:1400,food:1100,economy:4},
{name:"Вайдашка",shape:"vaydashka",capital:"Вайдашк",population:1000000,army:5000,area:50000,stability:40,money:400,food:350,economy:2},
{name:"Мурчик",shape:"murchyk",capital:"Мурлендія",population:2000000,army:10000,area:200000,stability:70,money:700,food:800,economy:3}
];
const S={date:new Date(START),player:null,countries:[],modalTarget:null,price:{economy:600,army:700,foodProd:500,houses:450},speed:1,timer:null,mapMode:"countries"};
function init(){S.countries=regions.map(c=>({...c,alive:true,relations:{},war:null,warDays:0,nextWar:r(90,150),nextEvent:r(7,21),delta:{p:0,m:0,f:0},foodProd:1,housing:1,lastHousingDay:0,overlord:null,rebelRel:0,rejectedPeace:{} }));
S.countries.forEach(a=>S.countries.forEach(b=>{if(a.name!==b.name)a.relations[b.name]=0;}));drawPick();drawMap();uDate();}
function drawPick(){el('countryGrid').innerHTML=S.countries.map(c=>`<div class='card pick' onclick="choose('${c.name}')"><h4>${c.name}</h4><div>👥 ${f(c.population)}</div><div>🛡️ ${f(c.army)}</div></div>`).join('');}
function drawMap(){const m=el('map');m.innerHTML='';S.countries.forEach(c=>{const d=document.createElement('div');d.className='region '+c.shape;d.id='r'+id(c.name);d.innerHTML=c.name.replace(' ','<br>')+`<div class='capital' title='Столиця: ${c.capital||'—'}'></div>`;d.onclick=()=>openCountryMenu(c.name);d.querySelector('.capital').onclick=(e)=>{e.stopPropagation();showCapital(c.name);};m.appendChild(d);});}
function choose(n){S.player=n;el('chooseScreen').classList.add('hidden');el('gameScreen').classList.remove('hidden');log('🌍 Старт за '+n);upd();resetTimer();}
function resetTimer(){if(S.timer)clearInterval(S.timer);S.timer=setInterval(()=>nextDay(S.speed),DAY_MS);}function toggleSpeed(){S.speed=S.speed===1?2:1;el('speedBtn').textContent='Швидкість: x'+S.speed;}
function toggleMapMode(){S.mapMode=S.mapMode==='countries'?'oblasts':'countries';el('mapModeBtn').textContent='Карта: '+(S.mapMode==='countries'?'Країни':'Області');log('🗺️ Режим карти: '+(S.mapMode==='countries'?'Країни':'Області'));}
function showCapital(name){const c=get(name);if(!c)return;log(`⭐ Столиця ${c.name}: ${c.capital||'—'}`);}
function nextDay(days=1){for(let i=0;i<days;i++){S.date.setDate(S.date.getDate()+1);alive().forEach(sim);wars();normalizeRelations();rebellions();}upd();}
function sim(c){const dens=c.population/c.area;let growthBase=0.00005 + c.economy*0.000004;let dP=Math.floor(c.population*growthBase),dM=Math.floor(c.economy*20+c.population/2200000),dF=Math.floor(c.economy*12*c.foodProd-c.population/1200000);
if(dayIndex()-c.lastHousingDay>120 && c.population/c.area>450){dP=Math.floor(dP*0.6);c.stability=Math.max(0,c.stability-0.03);}if(c.stability<55)dP-=20000;if(c.stability<35)dP-=35000;if(c.food<=0){dP-=Math.floor(c.population*0.0015);c.stability=Math.max(0,c.stability-0.35);}if(c.food<300)dP-=50000;if(dens>1000)dP-=Math.floor((dens-1000)*220);
if(c.war){dP=Math.floor(dP*0.4);dM=Math.floor(dM*0.65);dF=Math.floor(dF*0.7);c.army=Math.max(0,c.army-Math.max(25,Math.floor(c.army*0.0025)));c.stability=Math.max(0,c.stability-0.06);c.relations[c.war]=-100;}
if(c.stability<30){c.population=Math.max(0,c.population-Math.floor(c.population*0.0004));}
 c.population=Math.max(0,c.population+dP);c.money=Math.max(0,c.money+dM);c.food=Math.max(0,c.food+dF);c.delta={p:dP,m:dM,f:dF};if(c.name!==S.player)ai(c);if(--c.nextEvent<=0){evt(c);c.nextEvent=r(7,21);}if(--c.nextWar<=0){aiWar(c);c.nextWar=r(90,150);}if(c.overlord){c.rebelRel-=0.5;}}
function ai(c){if(Math.random()<.1&&c.money>550){c.money-=550;c.economy++;}if(Math.random()<.08&&c.money>700){c.money-=700;c.army+=2200;}if(Math.random()<.07&&c.money>500){c.money-=500;c.foodProd+=0.05;}if(Math.random()<.05&&c.money>500){const t=pick(alive().filter(x=>x.name!==c.name&&!allied(c,x)));if(t){c.relations[t.name]=Math.min(100,c.relations[t.name]+30);t.relations[c.name]=Math.min(100,t.relations[c.name]+30);}}
}
function aiWar(a){if(a.war||!a.alive)return;const t=alive().filter(b=>b.name!==a.name&&!allied(a,b)&&a.relations[b.name]<-10);if(!t.length)return;startWar(a,pick(t),'Планова атака');}
function startWar(a,b,why){if(a.war||b.war||!a.alive||!b.alive)return;a.war=b.name;b.war=a.name;a.warDays=b.warDays=r(5,30);a.relations[b.name]=-100;b.relations[a.name]=-100;log(`⚔️ ${a.name} ↔ ${b.name} (${why}, ${a.warDays} дн.)`);alive().forEach(c=>{if(c.name!==a.name&&c.name!==b.name&&allied(c,b)){c.relations[a.name]-=25;}});}
function wars(){alive().forEach(c=>{if(!c.war)return;c.warDays--;if(c.warDays<=0){const e=get(c.war);if(e&&e.alive&&e.war===c.name)resolve(c,e);}});} 
function resolve(a,b){const w=pow(a)>=pow(b)?a:b,l=w===a?b:a;annex(w,l);w.war=null;l.war=null;log(`🏴 ${w.name} анексувала ${l.name}`);} 
function annex(w,l){w.population+=Math.floor(l.population*.87);w.food+=Math.floor(l.food*.9);w.area+=l.area;w.money+=Math.floor(l.money*.55);w.army+=Math.floor(l.army*.3);l.overlord=w.name;l.alive=true;l.rebelRel=-20;l.population=Math.max(100000,Math.floor(l.population*0.13));const e=el('r'+id(l.name));e.classList.add('annexed');e.innerHTML=`${l.name}<br>(${w.name})`;}
function evt(c){const e=r(1,4);if(e===1){const dead=r(1000,30000);c.population=Math.max(0,c.population-dead);c.food=Math.max(0,c.food-220);c.stability=Math.max(0,c.stability-4);log(`🔥 Пожежа у ${c.name}, загинуло ${f(dead)}`);}if(e===2){c.stability=Math.max(0,c.stability-10);c.money=Math.max(0,c.money-280);log(`⚠️ Революційні настрої у ${c.name}`);}if(e===3&&c.name!==S.player){log(`🤝 ${c.name} запитує союз`);}if(e===4&&c.name!==S.player&&Math.random()<.35){const p=pl();if(p&&!p.war&&!allied(c,p))startWar(c,p,'Декларація війни');}}
function normalizeRelations(){alive().forEach(a=>alive().forEach(b=>{if(a.name===b.name)return;const r0=a.relations[b.name];if(r0<0 && !a.war)a.relations[b.name]=Math.min(0,r0+0.4);}));}
function rebellions(){alive().forEach(c=>{if(!c.overlord)return;if(c.rebelRel<=-100){const over=get(c.overlord);if(!over)return;c.stability=Math.max(0,c.stability-5);over.stability=Math.max(0,over.stability-5);over.army=Math.max(0,over.army-Math.floor(over.army*0.08));if(c.army>over.army*0.2){c.overlord=null;el('r'+id(c.name)).classList.remove('annexed');log(`🚩 ${c.name} здобула незалежність через революцію`);}c.rebelRel=-40;}});} 
function upgrade(t){const p=pl(),price=S.price[t];if(p.money<price)return log('❌ Мало грошей');p.money-=price;if(t==='economy')p.economy++;if(t==='army')p.army+=4000;if(t==='foodProd'){p.foodProd+=0.15;}if(t==='houses'){p.housing+=0.1;p.stability=Math.min(100,p.stability+3);p.lastHousingDay=dayIndex();}
S.price[t]=Math.floor(S.price[t]*1.1);upd();}
function openCountryMenu(name){if(!S.player||name===S.player)return;const t=get(name),p=pl();if(!t)return;S.modalTarget=name;const relTag=relStatus(p.relations[t.name]);el('mName').textContent=t.name;el('mInfo').innerHTML=`Твоя оцінка: <b>${p.relations[t.name].toFixed(1)}</b> (${relTag})<br>Населення: ${f(t.population)} | Стабільність: ${t.stability.toFixed(1)}% | Армія: ${f(t.army)}<br>Гроші: ${f(t.money)} | Їжа: ${f(t.food)}<br><br><b>Відносини з іншими:</b><br>${alive().filter(x=>x.name!==t.name).map(x=>`${x.name}: ${t.relations[x.name].toFixed(0)}`).join(' | ')}`;
const atWar = p.war===t.name;el('warPeaceBtn').textContent=atWar?'Мирний Договір':'Оголосити Війну';el('allyBtn').textContent=allied(p,t)?'Вийти з Союзу':'Зробити Союз';el('countryModal').classList.add('show');}
function closeModal(){el('countryModal').classList.remove('show');}
function peaceCost(a,b){return Math.floor(8000 + (b.army*0.08) + Math.max(0,-a.relations[b.name])*80);} 
function modalWarPeace(){const p=pl(),t=get(S.modalTarget);if(!t)return;if(p.war===t.name){if(p.rejectedPeace[t.name]) return log('❌ Ця країна вже відмовила до кінця війни');if(Math.random()<0.45){p.rejectedPeace[t.name]=true;log(`❌ ${t.name} відмовила у мирі до кінця війни`);return;}const cost=peaceCost(p,t);if(p.money<cost)return log(`❌ Для миру треба ${f(cost)}`);p.money-=cost;p.war=null;t.war=null;p.relations[t.name]=-60;t.relations[p.name]=-60;log(`🕊️ Мир з ${t.name} за ${f(cost)}`);}
else startWar(p,t,'Ти оголосив війну');openCountryMenu(t.name);upd();}
function modalAllianceToggle(){const p=pl(),t=get(S.modalTarget);if(!t)return;if(allied(p,t)){p.relations[t.name]=75;t.relations[p.name]=75;log(`↩️ Ти вийшов із союзу з ${t.name}`);}else{const cost=1200+Math.floor((100-p.relations[t.name])*10);if(p.money<cost)return log('❌ Мало грошей на союз');p.money-=cost;p.relations[t.name]=100;t.relations[p.name]=100;log(`🤝 Союз з ${t.name}`);}openCountryMenu(t.name);upd();}
function sendAid(){const p=pl(),t=get(S.modalTarget),sum=Math.max(0,Number(el('aidInput').value||0));if(!t)return;const needed=Math.max(10,Math.floor(peaceCost(p,t)/1000));if(sum<needed)return log(`❌ Для покращення відносин з ${t.name} треба мінімум ${needed}`);if(p.money<sum)return log('❌ Немає стільки грошей');p.money-=sum;t.money+=sum;const dev=Math.max(1,t.economy+t.army/12000+t.population/120000000),gain=Math.max(1,Math.floor((sum/needed)/dev));p.relations[t.name]=Math.min(100,p.relations[t.name]+gain);t.relations[p.name]=Math.min(100,t.relations[p.name]+Math.floor(gain*0.8));openCountryMenu(t.name);upd();}
function upd(){const p=pl();if(!p)return;uDate();set('countryName',p.name);set('population',f(p.population));set('money',f(p.money));set('food',f(p.food));set('army',f(p.army));set('area',f(p.area)+' км²');set('stability',p.stability.toFixed(1)+'%');set('economy',p.economy);delta('popDelta',p.delta.p);delta('moneyDelta',p.delta.m);delta('foodDelta',p.delta.f);
set('prices',`Ціни: Економіка ${f(S.price.economy)} | Армія ${f(S.price.army)} | Пекарня ${f(S.price.foodProd)} | Будинки ${f(S.price.houses)}`);el('btnEco').textContent='Прокачати економіку ('+f(S.price.economy)+')';el('btnArmy').textContent='Прокачати армію ('+f(S.price.army)+')';el('btnFood').textContent='Побудувати Пекарню ('+f(S.price.foodProd)+')';el('btnHouses').textContent='Побудувати Будинки ('+f(S.price.houses)+')';
alive().forEach(c=>{const e=el('r'+id(c.name));e.classList.toggle('player',c.name===p.name);e.classList.toggle('ally',allied(c,p));e.classList.toggle('war',p.war===c.name||c.war===p.name);if(c.overlord===p.name)e.classList.add('annexed');});
el('relations').innerHTML=alive().filter(c=>c.name!==p.name).map(c=>`<div class='row'><span>${c.name}${p.war===c.name?' (війна)':''}</span><b>${p.relations[c.name].toFixed(0)} ${relStatus(p.relations[c.name])}</b></div>`).join('');
const tPop=[...alive()].sort((a,b)=>b.population-a.population),tArmy=[...alive()].sort((a,b)=>b.army-a.army),tSt=[...alive()].sort((a,b)=>b.stability-a.stability);
el('tops').innerHTML=`<b>Населення</b><br>${tPop.map(x=>x.name+' '+f(x.population)).join('<br>')}<hr><b>Армія</b><br>${tArmy.map(x=>x.name+' '+f(x.army)).join('<br>')}<hr><b>Стабільність</b><br>${tSt.map(x=>x.name+' '+x.stability.toFixed(1)+'%').join('<br>')}`;}
function relStatus(v){if(v>=90)return 'Союз';if(v>=60)return 'Друзі';return ''}
function pow(c){return c.army*(.7+c.stability/100)+c.economy*450+c.population/80000}function alive(){return S.countries.filter(c=>c.alive)}function pl(){return get(S.player)}function get(n){return S.countries.find(c=>c.name===n)}
function allied(a,b){return a.relations[b.name]>=90&&b.relations[a.name]>=90}function pick(a){return a[Math.floor(Math.random()*a.length)]}function r(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function dayIndex(){return Math.floor((S.date-START)/86400000)}function delta(i,v){el(i).innerHTML=`<span class='${v>=0?'plus':'minus'}'>${v>=0?'+':''}${f(v)}</span>`}function set(i,v){el(i).textContent=v}
function el(i){return document.getElementById(i)}function id(t){return t.toLowerCase().replace(/\s+/g,'-').replace(/[']/g,'')}function log(t){const d=document.createElement('div');d.textContent=`${fd(S.date)} — ${t}`;el('log').prepend(d)}
function f(n){return Math.floor(n).toLocaleString('uk-UA')}function fd(d){const m=["січня","лютого","березня","квітня","травня","червня","липня","серпня","вересня","жовтня","листопада","грудня"];return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()} року`;}
function uDate(){el('date').textContent=fd(S.date)}
init();
</script></body></html>
